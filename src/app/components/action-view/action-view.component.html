<div class="row multi-select mt-4">
  <div class="col-3">
    <div *ngFor="let action of selectedTabData.actions;let index = index;">
      <button mat-raised-button color="primary" class="mb-4" [disabled]="(selectedItemNameList.length == 0 && (index === 7 || index === 8))" (click)="performAction(action,index)">{{action.title}}</button>
    </div>
  </div>
  <div class="col-6">
    <div class="row">
      <div class="col-12">
        <button mat-raised-button (click)="addChipToSelection(material)" class="mx-2 my-2" *ngFor="let material of frequentMaterialList; let index = index;">
          <mat-icon fontIcon="add"></mat-icon>
          {{material.label}}
        </button>
      </div>
    </div>
    <div class="row">
      <div class="col-6">
        <div class="accordion_container">
          <mat-accordion class="" multi>
            <mat-expansion-panel *ngFor="let key of leftList" color="primary" [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>{{key}}</mat-panel-title>
              </mat-expansion-panel-header>
              <div *ngFor="let material of selectedTabData.materials[key]">
                <mat-checkbox class="example-margin" (click)="onCheckboxChange(material)" [(ngModel)]="material.isChecked">{{ material.label }}</mat-checkbox>
              </div>
            </mat-expansion-panel>
          </mat-accordion>
        </div>
      </div>
      <div class="col-6">
        <div class="accordion_container">
          <mat-accordion class="" multi>
            <mat-expansion-panel *ngFor="let key of rightList" color="primary" [expanded]="true">
              <mat-expansion-panel-header>
                <mat-panel-title>{{key}}</mat-panel-title>
              </mat-expansion-panel-header>
              <div *ngFor="let material of selectedTabData.materials[key]">
                <mat-checkbox class="example-margin" (click)="onCheckboxChange(material)" [(ngModel)]="material.isChecked">{{ material.label }}</mat-checkbox>
              </div>
            </mat-expansion-panel>
          </mat-accordion>
        </div>
      </div>
    </div>
  </div>
  <div class="col-3">
    <mat-icon fontIcon="delete" (click)="clearAllChips()" class="float-end cursor-pointer" *ngIf="selectedItemNameList.length>0"></mat-icon>
    <div *ngFor="let material of selectedItemNameList;let index = index;" class="mb-2 mt-3" >
      <button mat-raised-button [disabled]="selectedItemNameList.length === 0" (click)="removeChip(index)">
        <mat-icon>cancel</mat-icon>
        {{material.label}}
      </button>
    </div>
  </div>
</div>
