<div class="row multi-select mt-4">
  <div class="col-3">
    <div *ngFor="let action of selectedTabData.actions;let index = index;" (click)="selectAction(action,index)" class="box" [class]="{'selected-box':selectedIndex === index, 'disabled':(selectedItemNameList.length == 0 && (index === 7 || index === 8))}">
      {{action.title}}
    </div>
  </div>
  <div class="col-3">
    <div class="accordion_container">
      <mat-accordion class="" multi>
        <mat-expansion-panel *ngFor="let key of leftList" color="primary" [expanded]="true">
          <mat-expansion-panel-header>
            <mat-panel-title>{{key}}</mat-panel-title>
          </mat-expansion-panel-header>
          <div *ngFor="let material of selectedTabData.materials[key]">
            <mat-checkbox class="example-margin" (click)="onCheckboxChange(material)" [(ngModel)]="material.isChecked">{{ material.label }}</mat-checkbox>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
  </div>
  <div class="col-3">
    <div class="accordion_container">
      <mat-accordion class="" multi>
        <mat-expansion-panel *ngFor="let key of rightList" color="primary" [expanded]="true">
          <mat-expansion-panel-header>
            <mat-panel-title>{{key}}</mat-panel-title>
          </mat-expansion-panel-header>
          <div *ngFor="let material of selectedTabData.materials[key]">
            <mat-checkbox class="example-margin" (click)="onCheckboxChange(material)" [(ngModel)]="material.isChecked">{{ material.label }}</mat-checkbox>
          </div>
        </mat-expansion-panel>
      </mat-accordion>
    </div>
  </div>
  <div class="col-3">
    <div *ngFor="let material of selectedItemNameList;let index = index;" class="custom-chip mb-2" >
      <span class="chip-label">{{material.label}}</span>
      <mat-icon aria-hidden="false" aria-label="Example home icon" fontIcon="cancel" class="cursor-pointer" (click)="removeChip(index)"></mat-icon>
    </div>
  </div>
</div>
