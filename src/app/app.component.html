<div class="container-fluid">
  <mat-tab-group (selectedTabChange)="onTabChange($event)" animationDuration="0ms">
    <mat-tab *ngFor="let tab of tabList; let i = index" [label]="tab.title">
      <ng-container>
        <app-action-view [selectedTabData]="tab"></app-action-view>
      </ng-container>
    </mat-tab>
  </mat-tab-group>
</div>
