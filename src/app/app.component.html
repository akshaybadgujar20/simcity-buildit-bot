<mat-sidenav-container class="sidenav-container">
  <!-- Sidenav for mobile layout -->
  <mat-sidenav #drawer mode="over" class="sidenav" (openedChange)="onSidenavToggle($event)">
    <mat-nav-list>
      <div *ngFor="let route of routerLinkList; let index = index">
        <mat-list-item (click)="drawer.toggle()" routerLink="route.link" (click)="selectRoute(index)" class="list-item" [class]="{'selected': selectedRoute === index}">{{route.name}}</mat-list-item>
        <mat-divider></mat-divider>
      </div>
    </mat-nav-list>
  </mat-sidenav>

  <!-- Main content -->
  <mat-sidenav-content>
    <!-- Toolbar for the top of the app -->
    <mat-toolbar color="primary">
      <button mat-icon-button (click)="drawer.toggle()">
        <mat-icon>menu</mat-icon>
      </button>
      <span>{{ tabList[selectedRoute]?.title }}</span>
    </mat-toolbar>

    <!-- Page content -->
    <!--<mat-tab *ngFor="let tab of tabList; let i = index" [label]="tab.title">
      <ng-container>
        <app-action-view [selectedTabData]="tab"></app-action-view>
      </ng-container>
    </mat-tab>-->
    <div class="custom-height">
      <app-action-view [selectedTabData]="tabList[selectedRoute]" ></app-action-view>
    </div>
    <div class="d-flex justify-content-around">
      <button mat-raised-button (click)="openBottomSheet()" color="warn">Take Action</button>
    </div>

  </mat-sidenav-content>
</mat-sidenav-container>
